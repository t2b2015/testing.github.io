<h1>What is your favorite place to travel?</h1> 
<p>I am building a directory of the sweetest travel destinations.</p>  
<form name="travel" onsubmit="identify(event)">
     What is your favorite travel destination?
    <input name="destination" required="" size="81" type="text"/> 
    <br><br><br> 
    Any recommendations (cool things to do, places to visit or restaurants to eat)? 
    <br><br> 
    <textarea cols="81" name="details" required="" rows="10">
    </textarea> 
    <br><br> 
    Name: <input name="fullname" required="" size="75" type="text"/> 
    <br><br> 
    Email: <input name="email" required="" size="75" type="email"/> 
    <br><br>
    <input name="submit" type="submit" value="submit"/>
</form> 

    <script type="text/javascript">
      function identify(e){
        e.preventDefault();
        var form = e.target;
        var email = form["email"].value;
        var fullname = form["fullname"].value;
        var destination = form["destination"].value;
        var details = form["details"].value;
        var user = {
            email: email, 
            name: fullname, 
            destination: destination, 
            details: details
        };
        analytics.identify('1234', {
            email: email, 
            name: fullname
        });
        analytics.track('destination submitted', user, function() {
            window.location.href = "";
        });
      }

        <!-- SIMPLE CHATBOT START -->
<style>
  #chat-widget { position: fixed; bottom: 20px; right: 20px; width: 300px; border-radius: 10px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-family: sans-serif; display: none; z-index: 9999; }
  #chat-header { background: #2b3137; color: white; padding: 15px; border-radius: 10px 10px 0 0; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
  #chat-messages { height: 250px; overflow-y: auto; padding: 10px; font-size: 14px; background: #f9f9f9; }
  #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: white; border-radius: 0 0 10px 10px; }
  #chat-input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
  #chat-send { margin-left: 8px; padding: 8px 12px; background: #2b3137; color: white; border: none; border-radius: 5px; cursor: pointer; }
  #chat-toggle { position: fixed; bottom: 20px; right: 20px; background: #2b3137; color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 9998; font-size: 16px; }
  .msg-user { color: #000; background: #dcf8c6; padding: 8px; border-radius: 10px; margin-bottom: 5px; text-align: right; width: fit-content; margin-left: auto; }
  .msg-bot { color: #000; background: #e5e5ea; padding: 8px; border-radius: 10px; margin-bottom: 5px; text-align: left; width: fit-content; margin-right: auto; }
</style>

<!-- The Chat Button -->
<button id="chat-toggle" onclick="document.getElementById('chat-widget').style.display='block'; this.style.display='none';">💬 Chat with us</button>

<!-- The Chat Window -->
<div id="chat-widget">
  <div id="chat-header" onclick="document.getElementById('chat-widget').style.display='none'; document.getElementById('chat-toggle').style.display='block';">
    <span>My Website Bot</span>
    <span>✖</span>
  </div>
  <div id="chat-messages">
    <div class="msg-bot">Hello! How can I help you today?</div>
  </div>
  <div id="chat-input-area">
    <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChat()">
    <button id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
  function sendChat() {
    let input = document.getElementById("chat-input");
    let text = input.value.trim();
    if (!text) return;

    let messages = document.getElementById("chat-messages");
    
    // 1. Show User Message
    messages.innerHTML += `<div class="msg-user">${text}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight; // Scroll to bottom

    // 2. Determine Bot Response
    setTimeout(() => {
      let reply = "I'm a simple bot. I don't know the answer to that yet!";
      let lowerText = text.toLowerCase();
      
      // Customize your bot's answers here!
      if (lowerText.includes("hello") || lowerText.includes("hi")) reply = "Hi there! Welcome to testing.github.io!";
      if (lowerText.includes("help")) reply = "I can help you navigate the site. What are you looking for?";
      if (lowerText.includes("contact")) reply = "You can reach the site owner on GitHub!";
      if (lowerText.includes("github")) reply = "This site is proudly hosted on GitHub Pages.";

      // 3. Show Bot Message
      messages.innerHTML += `<div class="msg-bot">${reply}</div>`;
      messages.scrollTop = messages.scrollHeight;
    }, 600); // 0.6 second delay to feel like a real chat
  }
</script>
<!-- SIMPLE CHATBOT END -->
